<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>神戸観光ダッシュボード</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>神戸観光ダッシュボード</h1>
    <p class="subtitle">
    神戸市観光スポットデータ分析ダッシュボード
    </p>

    <div class="kpi-container">
        <div class="kpi-card">
            <h2>総スポット数</h2>
            <p id="totalSpots">{{ kpi_data.total_spots }}</p>
        </div>

        
        <div class="kpi-card">
            <h2>平均評価</h2>
            <p id="avgRating">{{ kpi_data.avg_rating }}</p>
        </div>

        <div class="kpi-card">
            <h2>高評価スポット数</h2>
            <p id="recommendedSpots">{{ kpi_data.recommended_spots }}</p>    
        </div>

        <div class="kpi-card">
            <h2>人気No.1スポット</h2>
            <p id="topSpot">{{ kpi_data.top_spot }}</p>
        </div>
    </div>

    <div class="filter-area">
        <label for="areaSelect">地域選択</label>

        <select id="areaSelect">
            <option value="all">すべて</option>
            <option value="中央区">中央区</option>
            <option value="灘区">灘区</option>
            <option value="東灘区">東灘区</option>
            <option value="北区">北区</option>
            <option value="須磨区">須磨区</option>
            <option value="兵庫区">兵庫区</option>
            <option value="長田区">長田区</option>
            <option value="垂水区">垂水区</option>
        </select>
    </div>

    <div class="chart-card">
        <h2>カテゴリ別スポット数</h2>
        <canvas id="categoryChart"></canvas>
    </div>

    <div class="chart-grid">
        <div class="chart-card">
            <h2>エリア別スポット数</h2>
            <canvas id="areaChart"></canvas>
        </div>

        <div class="chart-card">
            <h2>人気スポット TOP10</h2>
            <canvas id="spotChart"></canvas>
        </div>
    </div>

    <div class="table-card">
    <h2>人気観光スポットランキング</h2>

    <table>
        <thead>
            <tr>
                <th>順位</th>
                <th>スポット</th>
                <th>エリア</th>
                <th>カテゴリ</th>
                <th>評価</th>
                <th>レビュー数</th>
                <th>人気指数</th>
            </tr>
        </thead>

        <tbody id="spotTableBody">
        </tbody>
    </table>
    </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let categoryChart;
let spotChart;

function loadKPI(area = "all") {

    fetch(`/api/kpi?area=${area}`)
        .then(response => response.json())
        .then(data => {

            document.getElementById("totalSpots")
                .textContent = data.total_spots;

            document.getElementById("avgRating")
                .textContent = data.avg_rating;

            document.getElementById("recommendedSpots")
                .textContent = data.recommended_spots;

            document.getElementById("topSpot")
                .textContent = data.top_spot;

        });
}

function loadCategoryChart(area = "all") {

    fetch(`/api/category-spots?area=${area}`)
        .then(response => response.json())
        .then(data => {

            const labels =
                data.map(item => item.category);

            const counts =
                data.map(item => item.count);

            const ctx =
                document.getElementById("categoryChart");

            if (categoryChart) {
                categoryChart.destroy();
            }

            categoryChart = new Chart(ctx, {

                type: "pie",

                data: {
                    labels: labels,

                    datasets: [{
                        data: counts
                    }]
                }

            });

        });
}

function loadSpotChart(area = "all") {

    fetch(`/api/spot-visitors?area=${area}`)
        .then(response => response.json())
        .then(data => {

            const labels =
                data.map(item => item.spot_name);

            const scores =
                data.map(item =>
                    item.popularity_score.toFixed(2)
                );

            const ctx =
                document.getElementById("spotChart");

            if (spotChart) {
                spotChart.destroy();
            }

            spotChart = new Chart(ctx, {

                type: "bar",

                data: {

                    labels: labels,

                    datasets: [{
                        label: "人気指数",
                        data: scores
                    }]
                },

                options: {

                    indexAxis: "y",

                    scales: {
                        x: {
                            beginAtZero: true
                        }
                    }
                }
            });

        });
}

function loadSpotTable(area = "all") {

    fetch(`/api/spot-table?area=${area}`)
        .then(response => response.json())
        .then(data => {

            const tableBody =
                document.getElementById("spotTableBody");

            tableBody.innerHTML = "";

            data.forEach((item, index) => {

                const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.spot_name}</td>
                    <td>${item.area}</td>
                    <td>${item.category}</td>
                    <td>${item.rating}</td>
                    <td>${item.review_count.toLocaleString()}</td>
                    <td>${item.popularity_score.toFixed(2)}</td>
                </tr>
                `;

                tableBody.innerHTML += row;

            });

        });
}

document.getElementById("areaSelect")
    .addEventListener("change", function () {

        const area = this.value;

        loadKPI(area);
        loadCategoryChart(area);
        loadSpotChart(area);
        loadSpotTable(area);

    });

loadKPI();
loadCategoryChart();
loadSpotChart();
loadSpotTable();

fetch("/api/area-visitors")
    .then(response => response.json())
    .then(data => {

        const labels =
            data.map(item => item.area);

        const counts =
            data.map(item => item.count);

        const ctx =
            document.getElementById("areaChart");

        new Chart(ctx, {

            type: "bar",

            data: {

                labels: labels,

                datasets: [{
                    label: "スポット数",
                    data: counts
                }]
            },

            options: {

                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

    });

</script>

</body>

</html>
